clients across different industries. I'm hardworking, detail-oriented, and I love numbers. I'm passionate about helping businesses grow through clean books."`,weakWhy:"Generic. Could describe anyone. No company names, no dates, no proof. The interviewer hears the same speech 50 times a week.",strong:`"I'm Maria \u2014 a remote bookkeeper based in Manila, currently managing month-end close for three US clients: Sunrise E-Commerce (a Shopify brand doing about $2.4M/year), Ramirez Real Estate Group (six rental properties in Texas), and Bright Path Marketing (a 12-person agency).

My most defining project was at Sunrise from March 2024 through July 2024. They came to me with 18 months of unreconciled books, no opening balances, and a tax extension running out in September. I led the cleanup solo \u2014 reconstructed bank feeds, fixed $34,000 in miscategorized expenses (most of it became legitimate tax deductions), and delivered clean books two weeks before the extension deadline. Their CPA called it the cleanest handoff she'd seen in three years.

That's what excites me about this role. You mentioned in the posting that you need someone who can own multi-entity close and catch the small stuff before the client does. That's exactly the rhythm I've built at Sunrise and Ramirez."`,strongWhy:"Names a real client, exact months (March 2024 \u2013 July 2024), specific numbers ($34K, 18 months, three clients), and ties the proof directly to the job description. Uses CAR: Context (cleanup needed, deadline) \u2192 Action (led solo, reconstructed, fixed) \u2192 Result (clean handoff, deadline beat). This sounds like a person \u2014 not a resume."},{q:"Why do you want to work for us?",why:"They want to know if you researched them or are mass-applying. Be specific.",approach:"Mention something concrete about THEM (their website, LinkedIn post, client niche, founder). Then tie to your skills with a real example.",weak:`"I want to work for you because I love your company culture and I admire what you do. I've heard great things about your team and I think this would be a great opportunity for me to grow and contribute. I'm passionate about bookkeeping and I think we'd be a great fit."`,weakWhy:'Could be sent to any company on Earth. Zero research evidence. "Great culture" and "passionate" are filler words.',strong:`"Two reasons. First, I went through your client list on your website and saw that 70% of your portfolio is real estate investors and property managers. From January 2023 through today, I've been doing the books for Ramirez Real Estate Group \u2014 six properties, trust accounting, the whole stack. That's the work I want to do more of, not less.

Second, I read your founder Jenna's post on LinkedIn from October 2025 \u2014 the one about how she trained her team to treat each rental property as a profit center using QBO classes. That's exactly how I built Ramirez's reporting in February 2024. So when I saw this role, it felt less like a job listing and more like a conversation I was already in."`,strongWhy:"Names the founder, references a specific LinkedIn post with the month, cites their actual client niche, and connects to a real engagement (Ramirez, January 2023, February 2024). Proves research without bragging."},{q:"What is your greatest strength?",why:'Most candidates give boring answers ("hardworking," "detail-oriented"). Stand out with one specific strength + proof.',approach:"Pick ONE strength relevant to the role. Tell a CAR-style mini-story with a real company name, date, and dollar outcome.",weak:`"My greatest strength is attention to detail. I'm really careful with numbers and I make sure everything is accurate. I double-check my work and I'm very organized. I think this is important in bookkeeping because even small mistakes can cause big problems."`,weakWhy:'Says "attention to detail" which every bookkeeper claims. No proof, no story, no outcome.',strong:`"Catching small numbers before they become big problems.

In August 2024, while reconciling the credit card for Sunrise E-Commerce, I noticed two charges from the same vendor \u2014 $1,247 and $1,247.50 \u2014 three days apart. The invoice numbers were one digit off but the amounts and vendor were nearly identical. Turned out the supplier had double-billed and the AP person was about to approve both.

Context: monthly close was already in flight and we had 200+ transactions to process. Action: I flagged it, pulled the original PO, and emailed the supplier with both invoices side-by-side. Result: $1,247 refunded within 48 hours, and the supplier added a duplicate-billing check to their system.

That's the pattern. The pattern recognition came from my first mentor at BPI Insurance back in 2019 \u2014 she made us reconcile every account every month, no shortcuts. That training is what I trust most when something feels off."`,strongWhy:"CAR structure done right. Specific date (August 2024), real company (Sunrise), exact dollar amount, real outcome. Even references an old mentor with year (BPI Insurance, 2019) to add depth. Memorable."},{q:"What is your greatest weakness?",why:'Trap question. NEVER say "I work too hard." NEVER lie. Show self-awareness + fix.',approach:"Pick a REAL weakness that is not core to the job. Tell what you did about it with a specific date. End on growth.",weak:`"My greatest weakness is that I'm a perfectionist. I sometimes spend too much time on small details. But I'm working on it by trying to balance speed and quality. I also work too hard sometimes and forget to take breaks."`,weakWhy:'Two of the most overused fake-weakness answers. Interviewers literally roll their eyes at "perfectionist" and "work too hard."',strong:`"Public speaking on live client review calls.

When I started doing monthly review calls for Bright Path Marketing in May 2024, I would over-prepare for two hours, then still read off notes for the first five minutes of the call. The client noticed \u2014 Mark, the founder, told me in June 2024 that I sounded more confident in emails than on Zoom.

That feedback stung but it was fair. So in July 2024, I joined a Toastmasters group online \u2014 Manila Online Speakers Club. I committed to one prepared speech a month. By November 2024, I was hosting Bright Path's monthly review without a script. I just bring three talking points and let the data tell the story.

It's still not my comfort zone. But it's no longer something I avoid \u2014 and Mark mentioned in January 2025 that my call presence is now one of the reasons he refers other agency owners to me."`,strongWhy:"A real weakness (public speaking) \u2014 not a fake one. Specific timeline (May \u2192 June \u2192 July \u2192 November 2024 \u2192 January 2025) shows real growth. Names the client and the founder. Ends with proof that the fix worked."},{q:"Why are you leaving your current job? / Why are you looking?",why:"NEVER badmouth past employers. Frame as moving TO something, not away from.",approach:"Be honest but professional. Talk about growth, scope, or fit. Use specific dates and details.",weak:`"My current job is okay but I feel like I'm not growing anymore. The boss is sometimes difficult and the pay is too low. I want a better company that values me and gives me more opportunities."`,weakWhy:'Badmouths the current employer ("boss is difficult", "pay is too low"). Red flag for the interviewer \u2014 if you talk this way about your current boss, you will talk this way about theirs.',strong:`"My current role at TaskCo BPO has been great for two years \u2014 I started there in September 2023 doing data entry, and by January 2025 I was managing the books for three small SMB clients independently. I learned QBO, I learned the rhythm of monthly close, I learned how to manage multiple clients without dropping balls.

But I've hit the ceiling of what I can learn here. All three clients are small, single-entity, cash-basis. I want to stretch into multi-entity work, accrual basis, and a team where there are senior people I can learn from.

When I read your job posting last week, the part about 'team-based engagements with mentorship' was the exact line that made me apply. That's what I'm moving toward \u2014 not away from anything."`,strongWhy:'Specific employer name (TaskCo BPO), exact dates (September 2023, January 2025), positive framing of past work, clear "moving toward" language tied to the actual JD.'},{q:"Where do you see yourself in 5 years?",why:'They are testing ambition AND commitment. Do not say "your job." Do not say "running my own firm" if applying to a firm.',approach:"Show you have thought about it. Tie growth to their kind of company, not away from it.",weak:'"In 5 years I see myself in a more senior role with more responsibilities. Hopefully earning more and growing in my career. Maybe leading a team or running my own bookkeeping firm someday."',weakWhy:'"Running my own firm" when applying to a firm = "I will leave you the moment I can." Vague otherwise. No depth.',strong:`"By 2030 I want to be the lead bookkeeper on your most complex engagements \u2014 the cleanups, the multi-entity work, the clients other people would be intimidated by.

Specifically: I want my QuickBooks Advanced Certification done by end of 2026 \u2014 I'm halfway through the modules already. By 2027 I want to add Xero certification because I noticed three of your clients in your portfolio use it. By 2028 I want to have led at least one full cleanup or migration project end-to-end on a team.

I'm not interested in starting my own firm. I want depth, not breadth. I want to be the expert on a team \u2014 the person clients ask for by name."`,strongWhy:'Concrete timeline (2026, 2027, 2028, 2030). Specific certifications. Mentions doing research on their client base (Xero). Closes with the "no I am not your future competitor" line that hiring managers love.'},{q:"Tell me about a time you made a mistake.",why:"They want to see ownership and learning, not excuses.",approach:"Use CAR. Take full responsibility. Show what you learned and the system fix you put in place.",weak:'"I once made a mistake at work but I quickly fixed it. I learned from it and now I am more careful. Mistakes happen but the important thing is to learn from them and move forward."',weakWhy:"No story, no specifics, no accountability. Reads as evasive \u2014 interviewer feels the candidate is hiding something.",strong:`"April 2024, my second month with Sunrise E-Commerce.

Context: The client received a $4,200 refund from a returned wholesale order. I categorized it as 'Other Income' instead of as a refund against Sales \u2014 overstated their revenue for the quarter.

Action: I caught it during the bank rec the following week when the numbers didn't tie. I emailed the founder, Elena, that same evening \u2014 told her exactly what happened, walked her through the impact, and showed her the correcting journal entry I was about to post. I also built a personal checklist: any transaction over $1,000 gets flagged for a second review before posting.

Result: We refiled the corrected Q2 numbers with her CPA before the deadline. Elena thanked me for the same-day flag \u2014 she said most of her past bookkeepers would have hidden it. And the $1K-review rule I built that day is still part of my workflow today.

What I learned: mistakes aren't the problem. Hiding them is. And the best fix is always a system, not just willpower."`,strongWhy:"Real CAR structure. Names the client (Sunrise), founder (Elena), exact month (April 2024), exact dollar amount ($4,200), exact rule built ($1K review). Closes with a one-line lesson. This is a textbook strong answer."},{q:"Tell me about a difficult client situation.",why:"They want to see emotional intelligence and problem-solving.",approach:"CAR method. Show empathy, communication, and resolution. Never blame the client.",weak:'"I had a difficult client who never sent receipts on time. He was always angry and rude. I tried my best but it was very stressful. Eventually I just had to be patient and keep reminding him."',weakWhy:'Blames the client ("angry and rude"). Shows no real solution \u2014 "patience" is not a system. Sounds passive.',strong:`"James, the owner at Ramirez Real Estate, from February 2024 through April 2024.

Context: Six rental properties, receipts arriving 6-8 weeks late, then James would get frustrated when his books weren't current. By the end of March 2024, I'd reconciled what I could but two properties were 90 days behind.

Action: I realized James wasn't being difficult \u2014 he was overwhelmed running six properties solo. So I built him a simple workflow. Set up a shared Google Drive folder where he could just photograph receipts on his phone and drop them in. Recorded a 4-minute Loom video walking through it. Scheduled a 15-minute weekly Friday check-in instead of waiting for month-end.

Result: By May 2024, receipts were coming in within 48 hours. Books stayed current. In June 2024, James referred his real estate partner to me. The fix wasn't a stricter policy \u2014 it was making it easier for him to win."`,strongWhy:"Names the client (James, Ramirez Real Estate), specific months (Feb-April 2024, May 2024, June 2024). The narrative arc is compelling: empathy \u2192 system \u2192 result \u2192 referral."},{q:"How do you handle deadlines and pressure?",why:"Bookkeeping is deadline-driven. They want proof you can deliver under pressure.",approach:"Show a SYSTEM, not just hustle. Reference a specific high-pressure month.",weak:`"I work well under pressure. I'm able to prioritize and stay calm. When things are stressful I just focus and get the work done. Deadlines motivate me to perform better."`,weakWhy:'Pure clich\xE9. Every candidate says "I work well under pressure." Zero proof.',strong:`"I work backwards from the deadline.

For month-end close at Sunrise E-Commerce, the deadline is the 10th. So by the 5th, all bank feeds are categorized. By the 7th, reconciliations are done. By the 9th, I've reviewed everything one more time. That gives me one buffer day.

The real test was January 2025 \u2014 year-end close for all three of my clients hit at the same time, and Sunrise added a surprise cleanup of October-December 2024 because their previous bookkeeper had left. Three closes, one cleanup, fifteen days.

What I did: I told all three clients on January 2nd which week each of them would get my focus. Sunrise's cleanup got the first week, Bright Path's standard close got week two, Ramirez's multi-entity close got week three. Nobody got bumped. Nobody got late.

When pressure spikes, I don't work later \u2014 I re-prioritize and communicate early. Communication is what keeps pressure manageable."`,strongWhy:"Specific company (Sunrise), specific month (January 2025), real scenario (year-end + cleanup), and a clear SYSTEM (backwards scheduling, week-by-week assignment, early communication)."},{q:"How do you handle constructive criticism / feedback?",why:"They want to know you are coachable.",approach:"Show you welcome it. Give a specific example with date + the improvement that followed.",weak:`"I welcome feedback. I think it's important to keep learning. I always try to apply feedback to improve myself and become better at my job."`,weakWhy:"Says all the right words but proves nothing. No example = the interviewer assumes you actually can't take feedback.",strong:`"Honestly? I crave it.

In September 2024, my supervisor at TaskCo \u2014 her name is Karen \u2014 told me my client emails were too long. Clients were skimming and missing the key questions.

That stung at first because I prided myself on being thorough. But she was right. I went back through my last 10 sent emails and counted the response rates \u2014 about 60%.

The next week I rewrote my email format using the BLUF method: Bottom Line Up Front. Subject line states the action needed. First sentence is the ask. Details follow. Three bullet points max.

By November 2024, response rate on the same type of email had jumped to over 95%. Karen flagged it in my year-end review.

Feedback that specific is rare. So when I get it, I act on it the same week."`,strongWhy:"Names the supervisor (Karen), specific months (September \u2192 November 2024), measurable outcome (60% \u2192 95%). Shows the candidate took the feedback as a system change, not a personality change."},{q:"Do you have any questions for us?",why:"NEVER say no. This is your chance to look engaged and qualified.",approach:"Ask 2-3 thoughtful questions. Avoid pay/benefits in the first interview.",weak:`"No, I think you covered everything. I'm just excited about the opportunity."`,weakWhy:'"I have no questions" tells the interviewer you are not actually thinking critically about the role. It signals "I will take any job."',strong:`"Three quick ones.

First \u2014 what does the first 90 days look like for someone in this role? Is there a structured onboarding, or do I dive in with a client right away?

Second \u2014 what does success look like at the 6-month mark? If we were sitting here in May 2026 doing a review, what would I have done or delivered that would make this hire a clear win for you?

Third \u2014 what's the biggest challenge the person who held this role before me ran into? I'd rather know now than find out in month two.

And if I can squeeze in a fourth \u2014 when do you expect to make a decision? I want to be respectful of your timeline."`,strongWhy:'Three smart, specific questions that signal seriousness. The "May 2026 review" line is a power move \u2014 it gets the interviewer mentally placing you in the role.'},{q:"Why should we hire you?",why:"The closer. Sum up your value in 60 seconds.",approach:"Pick 3 specific things from the job description and tie each to a proof point with company name + date.",weak:`"You should hire me because I'm hardworking, dedicated, and I have the right skills for this job. I'm a fast learner and I work well in a team. I would bring value to your company and I'd love the opportunity."`,weakWhy:'Generic adjectives ("hardworking, dedicated, fast learner") with no proof. The interviewer hears this 20 times a week.',strong:`"Three reasons.

One \u2014 you said in the JD you need someone who can own multi-entity close. From February 2024 through today, I've been doing exactly that for Ramirez Real Estate \u2014 six properties, each tracked as its own class in QBO, with consolidated and per-property statements every month. Never missed a close.

Two \u2014 you need someone comfortable with cleanups. March 2024 through July 2024, I led Sunrise E-Commerce's 18-month cleanup solo. Found $34,000 in miscategorized expenses, delivered books two weeks ahead of their tax extension deadline.

Three \u2014 you want someone who communicates proactively, not reactively. My clients hear from me before they need to ask. Last month \u2014 October 2025 \u2014 I caught a $1,247 duplicate vendor payment at Sunrise before the AP person approved it. That's the rhythm I'd bring to your team.

The rest \u2014 software fluency, attention to detail, US tax basics \u2014 that's table stakes. Those three things are what would make me valuable specifically to your team."`,strongWhy:'Three JD-matched proof points, each with a real company name, specific dates (Feb 2024 onward, March-July 2024, October 2025), and concrete numbers ($34K, $1,247, 18 months). The "table stakes" line is psychologically powerful \u2014 it positions the candidate as already past the basics.'}];function Jh(){let[e,a]=(0,t.useState)(0);return t.default.createElement("div",null,t.default.createElement("div",{style:{background:ne},className:"glass-card p-5 rounded-2xl mb-4"},t.default.createElement("div",{className:"flex gap-3 items-start"},t.default.createElement(he,{size:20,style:{color:b},className:"flex-shrink-0 mt-0.5"}),t.default.createElement("div",{className:"text-sm text-slate-700 leading-relaxed"},t.default.createElement("span",{className:"font-bold",style:{color:A}},"The 12 questions you WILL be asked \u2014 with WEAK and STRONG answers side by side.")," Notice the difference: strong answers always name specific companies, exact months and years, real dollar amounts. The CAR method (Context \u2192 Action \u2192 Result) appears throughout. Generic = forgettable. Specific = hireable."))),t.default.createElement("div",{className:"space-y-2"},Vh.map((o,s)=>{let r=e===s;return t.default.createElement("div",{key:s,className:"bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm"},t.default.createElement("button",{onClick:()=>a(r?-1:s),className:"w-full px-5 py-4 flex items-center gap-4 text-left"},t.default.createElement("div",{style:{background:`linear-gradient(135deg, ${b} 0%, ${K} 100%)`},className:"w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-md flex-shrink-0"},s+1),t.default.createElement("div",{className:"flex-1"},t.default.createElement("div",{style:{color:A,fontFamily:z},className:"text-base font-bold leading-tight"},o.q)),r?t.default.createElement(aa,{size:18,className:"text-slate-400"}):t.default.createElement(zt,{size:18,className:"text-slate-400"})),r&&t.default.createElement("div",{className:"px-5 pb-5 fade-in"},t.default.createElement("div",{className:"border-t border-slate-100 pt-4 space-y-4"},t.default.createElement("div",{className:"grid grid-cols-1 md:grid-cols-2 gap-3"},t.default.createElement("div",{className:"p-3 rounded-lg bg-slate-50"},t.default.createElement("div",{className:"text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 mb-1"},"Why they ask"),t.default.createElement("div",{className:"text-sm text-slate-700"},o.why)),t.default.createElement("div",{className:"p-3 rounded-lg bg-slate-50"},t.default.createElement("div",{className:"text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 mb-1"},"How to approach it"),t.default.createElement("div",{className:"text-sm text-slate-700"},o.approach))),t.default.createElement("div",{className:"grid grid-cols-1 lg:grid-cols-2 gap-3"},t.default.createElement("div",{className:"rounded-xl overflow-hidden border-2 border-red-200",style:{background:"#FEF2F2"}},t.default.createElement("div",{className:"px-4 py-2 bg-red-100 border-b border-red-200 flex items-center gap-2"},t.default.createElement("span",{className:"text-[10px] font-bold tracking-[0.2em] uppercase text-red-700"},"\u2717 Weak Answer"),t.default.createElement("span",{className:"text-[9px] text-red-600 italic"},"(what most candidates say)")),t.default.createElement("div",{className:"p-4"},t.default.createElement("div",{className:"text-sm text-slate-800 leading-relaxed italic mb-3"},o.weak),t.default.createElement("div",{className:"pt-3 border-t border-red-200"},t.default.createElement("div",{className:"text-[10px] uppercase tracking-[0.15em] font-bold text-red-700 mb-1"},"Why it fails"),t.default.createElement("div",{className:"text-xs text-slate-700 leading-relaxed"},o.weakWhy)))),t.default.createElement("div",{className:"rounded-xl overflow- pays a $500 utility bill from checking \u2014 Debit Utilities Expense $500, Credit Cash $500. Total debits must always equal total credits."},{q:"How do you reconcile a bank account?",a:"I start with the ending balance per QBO, then compare every transaction to the bank statement. I check off matching items, add anything on the statement not in QBO (bank fees, interest), and investigate anything in QBO not yet cleared. Final QBO balance + outstanding deposits \u2212 outstanding checks should equal bank statement balance. I never force-balance with adjustments."},{q:"What is Undeposited Funds?",a:"In QBO, Undeposited Funds is a holding account for customer payments received but not yet deposited to the bank. It lets you group multiple payments into a single deposit that matches what hits the bank. Critical to clear it monthly \u2014 when payments pile up there unmatched, it signals broken workflow."},{q:"What is the difference between Accounts Receivable and Accounts Payable?",a:"A/R is money customers OWE you for invoices you sent but haven't collected. It's an asset. A/P is money YOU OWE vendors for bills you received but haven't paid. It's a liability."},{q:"How do you handle depreciation?",a:"Depreciation spreads the cost of a fixed asset over its useful life. Common methods: Straight-Line (equal yearly amount), Double-Declining Balance (accelerated), MACRS (US tax standard). Monthly entry: Debit Depreciation Expense, Credit Accumulated Depreciation. The tax preparer usually handles MACRS; book depreciation often uses Straight-Line."},{q:"What is a chart of accounts?",a:"The full list of accounts a business uses to record transactions, organized by type (Assets, Liabilities, Equity, Income, Expenses) and usually numbered. A clean Chart of Accounts is the foundation of clean books \u2014 too few accounts and you can't see anything, too many and reports become noise."},{q:"What is the difference between an expense and a cost of goods sold (COGS)?",a:"COGS is the direct cost of producing or delivering what was sold \u2014 materials, direct labor, freight. It reduces Gross Profit. Operating Expenses are indirect costs to run the business \u2014 rent, software, admin payroll. They reduce Operating Income. The distinction matters because Gross Margin is a key health metric, and COGS misclassification distorts it."},{q:"What is deferred revenue?",a:"Deferred Revenue is cash received before the work is done or product delivered. It's a LIABILITY, not income, until earned. Example: a client prepays $12,000 for a 12-month SaaS subscription. Initially: Debit Cash $12K, Credit Deferred Revenue $12K. Each month: Debit Deferred Revenue $1K, Credit Revenue $1K."},{q:"How would you handle a transaction you're not sure how to categorize?",a:`First, I check if the client has a similar past transaction I can model from. If not, I ask the client directly \u2014 usually a quick screenshot and one question. If I still can't determine the right account, I post to a clearly-named holding account like "Ask My Accountant" or "Uncategorized \u2014 Review" and flag it for review. I never guess on transactions over $100.`},{q:"What's the difference between debits and credits?",a:"They're directional entries that keep the accounting equation in balance. Debits INCREASE Assets, Expenses, and Owner Draws. Credits INCREASE Liabilities, Equity, Income, and Capital. Mnemonic: DEAD CLIC. Every transaction has at least one debit and one credit, and they must always equal."},{q:"What is the matching principle?",a:"A GAAP rule that says expenses should be recorded in the same period as the revenue they helped generate. Example: if you sell a product in December but pay the supplier in January, you record both in December under accrual accounting. This produces accurate period profitability."},{q:"How do you handle a credit card reconciliation?",a:"Same process as a bank rec \u2014 match every transaction to the statement, check for missing items, reconcile to the ending balance. Critical extra step: confirm any annual fees, finance charges, or interest are captured. I reconcile credit cards monthly without fail because they're a common source of duplicate expense booking when not maintained."},{q:"Walk me through how you would clean up a messy QBO file.",a:'Step 1: Diagnostic \u2014 review Chart of Accounts, run all-time P&L and Balance Sheet, identify red flags (negative balances on assets, uncategorized expenses, unreconciled accounts). Step 2: Establish a clear "starting point" date with the client. Step 3: Reconcile bank and credit card accounts month by month from oldest. Step 4: Fix mis-categorized transactions in batches. Step 5: Clean up A/R and A/P aging. Step 6: Adjust opening balances if needed. Step 7: Document everything in a cleanup report for the client.'}];function Xh(){let[e,a]=(0,t.useState)(0);return t.default.createElement("div",null,t.default.createElement("div",{style:{background:ne},className:"glass-card p-5 rounded-2xl mb-4"},t.default.createElement("div",{className:"flex gap-3 items-start"},t.default.createElement(he,{size:20,style:{color:b},className:"flex-shrink-0 mt-0.5"}),t.default.createElement("div",{className:"text-sm text-slate-700 leading-relaxed"},t.default.createElement("span",{className:"font-bold",style:{color:A}},"16 technical questions you must be able to answer cold.")," If you can't answer 14 of these without hesitation, you're not ready yet. Memorize the concept, not the wording."))),t.default.createElement("div",{className:"space-y-2"},Kh.map((o,s)=>{let r=e===s;return t.default.createElement("div",{key:s,className:"bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm"},t.default.createElement("button",{onClick:()=>a(r?-1:s),className:"w-full px-5 py-4 flex items-center gap-3 text-left"},t.default.createElement("div",{style:{background:ie,color:A},className:"w-8 h-8 rounded-lg flex items-center justify-center font-bold text-xs flex-shrink-0"},s+1),t.default.createElement("div",{className:"flex-1"},t.default.createElement("div",{style:{color:A},className:"text-sm font-bold leading-snug"},o.q)),r?t.default.createElement(aa,{size:16,className:"text-slate-400"}):t.default.createElement(zt,{size:16,className:"text-slate-400"})),r&&t.default.createElement("div",{className:"px-5 pb-5 fade-in"},t.default.createElement("div",{className:"border-t border-slate-100 pt-3 p-3 rounded-lg",style:{background:ie}},t.default.createElement("div",{className:"text-sm text-slate-800 leading-relaxed"},o.a))))})))}function Zh(){let[e,a]=(0,t.useState)(""),[o,s]=(0,t.useState)(!1),[r,n]=(0,t.useState)(null),i=async()=>{if(e.trim()){s(!0),n(null);try{let d=`You are an executive interview coach who specializes in the CAR storytelling method (Context, Action, Result). You help international remote bookkeepers craft compelling answers to behavioral interview questions for US clients.

Rules:
- Generate a complete CAR story based on the candidate's raw scenario
- Context: 1-2 sentences setting the stage (what was happening, what was at stake)

- Owner is closing books at 11pm Sunday instead of seeing family
- Books are in shoeboxes, not a real accounting system
- They pay a US local bookkeeper $4K-$8K/month for work that could be done for $1.5K-$3K remote
- 1099 chaos every January \u2014 missing W-9s, last-minute panic
- No monthly financials, so they can't make decisions or get a loan
- Bank reconciliations 3 months stale
- Mixing personal and business expenses on the same card
- Sales tax exposure across multiple states (Wayfair nexus)
- Inventory accounting wrong (e-comm, restaurant)
- Tax surprise every April because no quarterly planning
- Owner doing data entry themselves at $200/hour effective rate
- Accounting firm partner stuck doing Tier 1 production work
- US firm wants to scale past $500K rev but capacity-capped

- Dan Martell cadence: framework-driven, mentor energy, "here's what most people miss" tone.
- Conversational, not corporate. Talk like a smart friend who happens to be an expert.
- Use "you" 5x more than "I."
- Lead with the prospect's BOOKKEEPING pain or outcome. NEVER lead with yourself.

- Stack value: list 3-5 concrete BOOKKEEPING outcomes (reconciled accounts by the 10th, monthly P&L by the 12th, 1099s ready by January 31), not features.

n and I want to give you a thoughtful yes. Can I confirm by tomorrow EOD?" 99% of employers will say yes. Pressure tactics signal desperation on THEIR side, not yours.'},{tip:"Never threaten or ultimatum",detail:`Threats burn bridges and rarely work. Replace "I'll walk if not..." with "I'd really love to make this work. Help me understand what flexibility exists."`}]},{phase:"Annual Raises & Rate Reviews",icon:"\u{1F4C8}",tips:[{tip:"Lock in annual review in the engagement letter",detail:'Build it in upfront: "Rate reviewed annually on engagement anniversary." This makes raises a default, not a confrontation.'},{tip:"Document wins all year long",detail:'Keep a running "Wins Doc" \u2014 every catch, every cleanup, every late-night save. When raise season comes, you have receipts.'},{tip:"Ask for 8-12% per year minimum",detail:'Inflation alone runs 3-4%. A "performance" raise must be on TOP of inflation. Aiming for 8-12% nets you 4-8% real growth. Below 5% is going backward.'},{tip:"Tie raises to client-side wins",detail:`"Your revenue grew 22% this year. I caught $14K in misclassified expenses that became deductions. The market rate for this work is now $22-$28/hr. Let's land at $24."`}]}],ng=[{scenario:`When asked "What's your expected salary?" in the first interview`,response:`"That's a great question. I want to make sure I'm giving you a thoughtful answer, so let me ask first \u2014 what does the budget look like for this role given the scope and experience level you're targeting?"

l cost to the specific job it served."},{title:"1099 subcontractors",detail:"Construction has the highest 1099 risk. Every sub paid $600+ needs W-9 collected BEFORE first payment. Track sub liability insurance certificates \u2014 expired COIs expose the GC to lawsuits."}],coaHighlights:["Job Materials (5010)","Subcontractor Costs (5020)","Equipment Rental (5030)","Job Labor (5040)","Permits & Inspections (5050)","WIP Asset (1450)","Retention Receivable (1460)","Customer Deposits / Deferred Rev (2350)"],redFlags:['Single "Materials" expense bucket with no project tags',"No WIP schedule reconciled monthly","Missing W-9s for active subcontractors","Retention sitting in regular A/R aging report","No tracking of change orders separate from base contract"],remoteAdvantage:["Many GCs are field-based and behind on books \u2014 perfect cleanup engagement for a remote bookkeeper working evenings (their morning) US time.","Subcontractor W-9 chasing + 1099 prep is high-volume, low-skill US work that's ideal to delegate offshore at $20-$30/hour.","WIP schedule maintenance and job-cost reporting are weekly recurring tasks \u2014 a remote bookkeeper can own this and free the owner to be on-site.",'Pitch line: "I handle your bank feeds, subcontractor 1099 tracking, retention aging, and WIP schedule every week \u2014 so you stay on-site and stop closing books at midnight on Sundays."']},{id:"ecommerce",name:"E-Commerce",icon:"\u{1F6D2}",tagline:"Channel reconciliation will haunt you.",nuances:[{title:"Multi-channel revenue reconciliation",detail:"Shopify, Amazon, eBay, Etsy each report differently. Gross sales \u2260 deposits. Each platform takes fees, holds for refunds, and pays out on different cycles. Reconcile each channel's payout reports to the bank deposit."},{title:"Sales tax nexus (economic + physical)",detail:"Selling to a state with $100K+ revenue OR 200+ transactions triggers nexus. Each state has its own threshold. Marketplace facilitator laws (Amazon, Etsy) shift some collection \u2014 but not all states. Track nexus per state."},{title:"Inventory accounting",detail:"COGS must move with inventory sold (FIFO, weighted-avg, or specific identification). Most QBO files book inventory wrong \u2014 they expense purchases instead of capitalizing to Inventory Asset and relieving COGS on sale."},{title:"Returns & chargebacks",detail:"A return is NEGATIVE revenue, not an expense. Chargebacks need their own account to track patterns. High chargeback rate = fraud problem or product problem."},{title:"Merchant processor fees",detail:'Shopify Payments, Stripe, PayPal, Amazon Pay each take a different percentage. Book fees to a clear "Merchant Processing Fees" account \u2014 never net against revenue. The gross-up matters for sales tax filings.'},{title:"Ad spend separate from COGS",detail:"Facebook/Google ads are an Operating Expense, not COGS. The exception: paid traffic ads tied to specific products in cost-of-acquisition models may be classified as variable selling cost."}],coaHighlights:["Inventory Asset (1300)","Shopify Revenue (4010)","Amazon Revenue (4020)","Etsy Revenue (4030)","Returns & Allowances (4900)","Cost of Goods Sold (5010)","Merchant Processing Fees (5100)","Shipping Income (4400)","Shipping Expense (5400)","Ad Spend - Meta (6310)","Ad Spend - Google (6320)"],redFlags:["Inventory expensed as purchased instead of capitalized","Sales tax not tracked per state","Revenue booked at gross of merchant fees","No A2X, Synder, or LinkMyBooks integration for channel sync","Returns hitting Misc Expense instead of contra-revenue"],remoteAdvantage:["E-comm sellers run 24/7 globally \u2014 a Manila-based bookkeeper covers US overnight hours and processes sales/refunds before the owner even wakes up.","A2X, Synder, LinkMyBooks reconciliations are repetitive and rule-based \u2014 perfect for a trained remote bookkeeper to own end-to-end.","Multi-channel revenue reconciliation eats 8-15 hours a week \u2014 that is 50%+ of a $1,500-$3,000/month engagement, easily justified.",'Pitch line: "I reconcile your Shopify, Amazon, and Etsy payouts daily, track sales tax nexus per state, and deliver clean monthly financials by the 10th \u2014 at a fraction of a US bookkeeper rate."']},{id:"lawfirm",name:"Law Firm",icon:"\u2696\uFE0F",tagline:"IOLTA compliance or you lose your license.",nuances:[{title:"IOLTA trust accounting",detail:"Client funds (retainers, settlements) MUST be in a separate Interest on Lawyers Trust Account. Never commingle with operating. Three-way reconciliation monthly: bank statement = trust ledger = sum of client ledger balances."},{title:"Operating vs trust accounts",detail:"Earned fees move from trust to operating only AFTER work is performed and billed. Moving early = co-mingling = bar complaint. Track every transfer with the matching invoice."},{title:"Retainer accounting",detail:"Unearned retainer = LIABILITY in trust (Client Funds Held). As work is billed, debit the liability and credit revenue. The trust balance must always equal client ledger sum."},{title:"Case cost advances (hard vs soft)",detail:"Hard costs (filing fees, expert witnesses) = receivable, reimbursable. Soft costs (postage, copies) = expense, may or may not be billable. Track separately per matter."},{title:"Matter-level profitability",detail:"Bill time, expenses, and costs per matter. Use Classes or Projects in QBO. Without matter-level reporting, partners cannot see which practice areas are profitable."},{title:"Contingency fee accounting",detail:"No revenue recognized until case settles. Costs advanced sit as receivable. When settlement hits: receivable cleared, settlement split per fee agreement, client share disbursed from trust."}],coaHighlights:["IOLTA Trust Account (1010)","Operating Account (1020)","Client Funds Held - Liability (2100)","Advanced Case Costs - Receivable (1410)","Earned Fee Income (4010)","Contingency Fee Income (4020)","Filing Fee Reimbursements (4050)","Bar Dues (6210)"],redFlags:["Single bank account for trust + operating","Three-way trust rec not performed monthly","Retainer booked as income before earned","No matter-level cost tracking","Negative balance in any client trust ledger (bar violation)"],remoteAdvantage:["IOLTA three-way reconciliation is high-stakes, monthly, rule-based work \u2014 exactly what a trained remote bookkeeper should own to free the partner.","Matter-level cost tracking and retainer drawdown can be done remotely with weekly reports \u2014 partners hate this admin work.","Many small law firms are 1-3 lawyers + 1 paralegal \u2014 no budget for a US bookkeeper, but $1,500/month for a remote pro is in reach.",'Pitch line: "I handle your IOLTA reconciliation, retainer-to-revenue conversions, and matter-level profitability reports \u2014 so you stay in court, not in QBO."']},{id:"realestate",name:"Real Estate (Investor / Property Mgmt)",icon:"\u{1F3D8}\uFE0F",tagline:"Each property is its own profit center.",nuances:[{title:"Property-by-property tracking",detail:"Every rental property is its own class/project in QBO. Income, expenses, and capital improvements get tagged. Owners need to see profitability per door \u2014 not just total."},{title:"Security deposits (liability, NOT income)",detail:"Security deposits = LIABILITY on Balance Sheet. Most jurisdictions require deposits held in a separate account. Releasing partial deposit on move-out is a journal entry, not a refund expense."},{title:"Capital improvements vs repairs",detail:"Replacing a roof = capitalize and depreciate (Section 1250 property, 27.5 years residential). Patching a roof = repair, expense immediately. Get this wrong and you over/understate taxable income significantly."},{title:"Depreciation strategy",detail:"Residential rental: 27.5 years straight-line. Commercial: 39 years. Land never depreciates. Cost segregation studies can accelerate depreciation on components."},{title:"Section 1031 like-kind exchanges",detail:"Selling one property and rolling proceeds into another via a Qualified Intermediary defers capital gains. The accounting requires tracking deferred gain on the new property's basis."},{title:"Owner draws vs distributions",detail:"LLC owner pulling money: draws (single-member LLC) or distributions (multi-member). Never wages \u2014 landlord cannot be on payroll of their own rental."}],coaHighlights:["Operating Bank (1010)","Security Deposit Trust (1020)","Land - 123 Main St (1500)","Building - 123 Main St (1510)","Accumulated Depreciation - 123 Main St (1515)","Security Deposits Held - Liability (2100)","Rental Income (4010)","Late Fees Income (4050)","HOA Dues (6100)","Property Management Fees (6200)","Repairs & Maintenance (6300)","Capital Improvements (1525)"],redFlags:["Security deposits mixed with operating cash","Roof replacements expensed instead of capitalized","No per-property P&L generated monthly","Mortgage principal hitting expense instead of liability paydown","Personal expenses run through the rental"],remoteAdvantage:["Per-property class tracking is repetitive and tedious \u2014 landlords with 3+ properties hire remote bookkeepers specifically to own this.","Security deposit liability tracking, capital improvement vs repair categorization, mortgage statement splits \u2014 all weekly tasks delegable offshore.","Many investors own properties across multiple states \u2014 a remote bookkeeper running QBO classes is more cost-effective than a US-based property manager.",'Pitch line: "I run per-property P&Ls every month, track every security deposit as a liability, and flag every roof-vs-repair categorization decision \u2014 so you can buy your next door."']},{id:"restaurant",name:"Restaurant / F&B",icon:"\u{1F37D}\uFE0F",tagline:"Watch food cost % like a hawk.",nuances:[{title:"Food cost percentage tracking",detail:"Food Cost % = (Beginning Inventory + Purchases - Ending Inventory) \xF7 Food Sales. Target: 28-35%. Drift above 35% = recipe drift, theft, or waste. Calculate weekly, not monthly."},{title:"Tip pooling & reporting",detail:"Cash tips = employee income, reported to IRS. Credit card tips passed through to employees, also reported. Tip credit (paying below minimum wage) requires meticulous tracking per state."},{title:"POS integration",detail:"Toast, Square, Clover should sync daily sales into QBO. Each day creates a Sales Receipt: gross sales, sales tax collected, tips collected, fees deducted, net deposit. Without integration, daily reconciliation is hell."},{title:"Cash vs accrual inventory",detail:"Most small restaurants stay cash basis for tax. But for management reporting, accrual is essential \u2014 inventory swings $5K week-to-week distort profitability if not capitalized."},{title:"Linens, paper, smallwares",detail:"Plates, glasses, table linens: capitalize if over $2,500 (de minimis safe harbor) and depreciate. Smaller items expense immediately. Smallwares replacement is often 1-3% of revenue."},{title:"Liquor license & permits",detail:"Annual fees, health permits, liquor license renewals \u2014 all separate accounts. Many jurisdictions require posting the license. Track expiration in the engagement letter system."}],coaHighlights:["Operating Cash (1010)","Inventory - Food (1310)","Inventory - Liquor (1320)","Food Sales (4010)","Beverage Sales - NA (4020)","Beverage Sales - Alcohol (4030)","Food Cost (5010)","Beverage Cost (5020)","Server Wages (6010)","Kitchen Wages (6020)","Tips Payable - Liability (2200)","POS Fees (6310)"],redFlags:["Food Cost % above 38% for three months running","POS not integrated with QBO","Tips treated as restaurant revenue instead of pass-through liability","No weekly inventory count","Liquor and food revenue not separated (sales tax issue)"],remoteAdvantage:["Restaurant owners work 14-hour days \u2014 they need someone reconciling POS deposits while they sleep. Time-zone alignment is your edge.","Daily sales summary entries from Toast/Square/Clover are pattern-based and ideal for a remote bookkeeper to automate.","Weekly food cost % calculation, tip pool reconciliation, vendor payment scheduling \u2014 recurring tasks where a remote bookkeeper saves 10+ hours a week.",'Pitch line: "I post your daily sales receipts, reconcile your tips pool, calculate your food cost % every Monday, and deliver a flash P&L every Friday \u2014 at a third of what a local bookkeeper costs."']},{id:"medical",name:"Medical / Healthcare",icon:"\u{1F3E5}",tagline:"Insurance contractual adjustments are the killer.",nuances:[{title:"Insurance contractual adjustments",detail:"Provider bills $500 for a visit. Insurance contract allows $180. The $320 difference is a contractual adjustment \u2014 contra-revenue, NOT bad debt. This eats 30-50% of gross billings for most practices."},{title:"Patient responsibility (copay, coinsurance, deductible)",detail:"After insurance pays, patient owes the balance. Track per encounter. Aging on patient A/R is far worse than insurance A/R \u2014 write-off policy needs to be explicit."},{title:"HIPAA considerations in workflow",detail:"Bookkeeper should never see PHI (patient health information). Receive only summary reports from billing software (eClinicalWorks, Kareo, Athena). Sign a Business Associate Agreement (BAA)."},{title:"CPT code revenue tracking",detail:"High-margin procedures (CPT codes) need separate revenue accounts. Owner needs to see which services drive profit. E&M visits, procedures, ancillary (lab, imaging) \u2014 separate buckets."},{title:"Provider compensation models",detail:"Salary, productivity-based (RVU), or hybrid. Each requires different tracking. Productivity models need RVU x conversion factor reporting tied to billing."},{title:"Medical malpractice insurance",detail:"Significant fixed cost ($5K-$50K+/year per provider). Tail coverage and prior acts riders are commonly missed. Capitalize and amortize if paid annually."}],coaHighlights:["Operating Cash (1010)","Patient A/R (1210)","Insurance A/R (1220)","Allowance for Doubtful Accounts (1290)","Gross Service Revenue - E&M (4010)","Gross Service Revenue - Procedures (4020)","Contractual Adjustments (4900)","Bad Debt Expense (6800)","Provider Wages (6010)","Medical Supplies (5010)","Malpractice Insurance (6220)"],redFlags:["Revenue booked at gross billings (no contractual adjustment)","No patient vs insurance A/R distinction","Bookkeeper receiving PHI without BAA",'Single "Medical Revenue" account',"No bad debt write-off policy"],remoteAdvantage:["HIPAA-compliant remote bookkeepers (signed BAA, summary reports only) can fully serve small practices without ever touching PHI.","Contractual adjustment posting from EOB summaries is repetitive \u2014 perfect for a remote bookkeeper trained on Kareo/Athena reports.","Patient AR aging follow-up, insurance AR review, and bad debt reserve calculations are weekly tasks practices delegate gladly.",'Pitch line: "I post your contractual adjustments from your billing software, reconcile patient AR, and deliver a clean monthly P&L by the 12th \u2014 fully HIPAA-compliant, no PHI ever touched."']},{id:"saas",name:"SaaS / Software",icon:"\u{1F4BB}",tagline:"Deferred revenue is your biggest line item.",nuances:[{title:"Deferred revenue (THE big one)",detail:"Client pays $12,000 for an annual subscription. Day 1: Debit Cash $12K, Credit Deferred Revenue (liability) $12K. Each month: Debit Deferred Rev $1K, Credit Revenue $1K. ASC 606 compliance \u2014 recognize as service is delivered, not when cash hits."},{title:"MRR / ARR tracking",detail:"Monthly Recurring Revenue and Annual Recurring Revenue are the lifeblood metrics. New MRR + Expansion - Churn = Net MRR change. These come from billing systems (Stripe, Chargebee), not QBO directly."},{title:"CAC (Customer Acquisition Cost)",detail:"Total sales + marketing spend \xF7 new customers acquired. SaaS investors require this. CAC payback period < 12 months is the goal."},{title:"R&D vs capitalized software costs",detail:"Internal-use software development can be capitalized under ASC 350-40 (preliminary stage = expense; application development = capitalize; post-implementation = expense). Most early-stage SaaS expenses everything."},{title:"Stock-based compensation",detail:"Options granted to employees: expense over vesting period using Black-Scholes valuation. Critical for VC-backed startups before any funding round."},{title:"Revenue recognition complexity",detail:"Setup fees: spread over expected customer life, not collected upfront. Multi-element arrangements (software + support + training) require allocating transaction price to each performance obligation."}],coaHighlights:["Operating Cash (1010)","Stripe Pending (1110)","Accounts Receivable (1210)","Capitalized Software (1610)","Subscription Revenue (4010)","Implementation Revenue (4020)","Professional Services Revenue (4030)","Deferred Revenue - Short Term (2300)","Deferred Revenue - Long Term (2700)","Hosting & Infrastructure (5010)","Engineering Wages (6010)","Sales & Marketing (6310)"],redFlags:["Annual subscriptions booked as revenue at billing instead of deferred","No MRR/ARR reporting alongside P&L","Setup fees recognized immediately","No tracking of customer churn","Hosting costs miscategorized as office expense"],remoteAdvantage:["Deferred revenue accounting is THE bookkeeping pain point for SaaS founders \u2014 and a remote bookkeeper trained on ASC 606 is gold to them.","Stripe/Chargebee monthly journal entries, MRR/ARR tracking, churn cohort reports \u2014 recurring high-skill work that justifies $2K-$5K/month engagements.","SaaS founders are tech-native \u2014 they prefer Slack + Loom over phone calls, which is the remote bookkeeper natural workflow.",'Pitch line: "I run your monthly deferred revenue schedule, recognize your Stripe/Chargebee revenue properly under ASC 606, and deliver MRR/ARR dashboards every month \u2014 so when you raise your next round, your books are diligence-ready."']},{id:"agency",name:"Marketing / Creative Agency",icon:"\u{1F3A8}",tagline:"Pass-throughs vs revenue is the #1 mistake.",nuances:[{title:"Media buys: pass-through vs principal",detail:'If client gives agency $50K for ad buys and agency runs them through their own ad accounts, the $50K is REVENUE (and the buy is COGS). If client pays the platform directly, agency only records the management fee as revenue. ASC 606 "principal vs agent" decision.'},{title:"Project-based revenue (retainer vs project)",detail:"Retainer: monthly recognition, even billings. Project: revenue recognized as deliverables completed. Mixing these in one revenue line destroys profitability analysis."},{title:"Utilization rate tracking",detail:"(Billable hours \xF7 Total hours worked) \xD7 100. Target: 65-75% for senior staff. Below 50% = pricing or staffing problem. Above 85% = burnout coming."},{title:"Contractor vs employee classification",detail:"Agencies use lots of freelancers. Misclassification audits are common. If you control how, when, and where they work \u2014 it's employee, not contractor."},{title:"Software stack as COGS or OpEx",detail:"Adobe, Figma, Canva, Slack: OpEx. But client-specific software (ad platforms, CRM seats for client) may be billed back as project cost (COGS)."},{title:"Project profitability tracking",detail:"Tag every hour and expense to a project/client. Run monthly Profit-by-Project reports. Without this, agencies under-price the unprofitable work and over-deliver on it."}],coaHighlights:["Operating Cash (1010)","A/R (1210)","Unbilled Revenue (1230)","Retainer Revenue (4010)","Project Revenue (4020)","Media Buy Pass-Through Rev (4030)","Media Buy Cost (5010)","Contractor Costs - Project (5020)","Salaries - Account Mgmt (6010)","Salaries - Creative (6020)","Software Subscriptions (6310)"],redFlags:["Media buys netted against revenue instead of grossed up","No project-level profit tracking","Retainer + project revenue lumped together","Contractors paid as employees or vice versa","No utilization rate reporting"],remoteAdvantage:["Agencies are notoriously bad at separating retainer revenue from project revenue \u2014 a remote bookkeeper trained on agency models fixes this immediately.","Time-tracking integration (Harvest, Toggl, BigTime), project profitability reports, contractor 1099 tracking \u2014 recurring work delegable offshore.",'Agency owners are remote-team native (they manage creative contractors globally), so they are the easiest "yes" for hiring a remote bookkeeper.','Pitch line: "I separate your retainer MRR from project revenue, track project-level profitability every week, and own all your contractor 1099 prep \u2014 so you stop guessing which client is actually profitable."']},{id:"nonprofit",name:"Nonprofit",icon:"\u{1F91D}",tagline:"Fund accounting, not for-profit accounting.",nuances:[{title:"Restricted vs unrestricted net assets",detail:"Donations come with strings. Unrestricted: use anywhere. Temporarily restricted: must spend on specific purpose/timeframe. Permanently restricted: endowment principal preserved. Three separate net asset categories on balance sheet."},{title:"Functional expense allocation",detail:"Every expense must be coded to Program, Management & General, or Fundraising. Form 990 requires this. Allocate rent, utilities, salaries across functions using time studies or square footage."},{title:"In-kind donations",detail:"Donated goods/services valued at fair market value, booked as both revenue and expense. Donated services only recorded if they require specialized skills (e.g., donated legal work, not donated stuffing-envelopes)."},{title:"Form 990 / 990-EZ filing",detail:"Annual IRS filing. Public document. Reveals every salary over $100K, every contractor over $100K, related-party transactions. Bookkeeping must support these disclosures."},{title:"Grant accounting",detail:"Conditional grants (must meet milestones): recognize as conditions met. Unconditional grants: recognize immediately at fair value. Track restriction releases as separate journal entries."},{title:"Fundraising event accounting",detail:"Ticket sales = revenue. Sponsorships = contribution income. Direct event costs (venue, catering) = expense. Gross all up; reporting net misleads donors and Form 990."}],coaHighlights:["Operating Cash (1010)","Investments - Endowment (1500)","Contributions Receivable (1410)","Pledges Receivable (1420)","Unrestricted Contributions (4010)","Temp Restricted Contributions (4020)","Government Grants (4100)","In-Kind Contributions (4150)","Program Expenses (6010)","Management & General (6500)","Fundraising Expenses (6600)","Net Assets - Unrestricted (3100)","Net Assets - Temp Restricted (3200)","Net Assets - Perm Restricted (3300)"],redFlags:["No functional expense allocation","Restricted donations spent on unrestricted purposes","In-kind donations not recorded","Fundraising events reported net instead of gross","No tracking of donor restrictions or release of restrictions"],remoteAdvantage:["Nonprofit boards are unpaid volunteers \u2014 they cannot afford a US bookkeeper but desperately need clean books for Form 990 + funders.","Functional expense allocation, grant restriction tracking, in-kind donation recording \u2014 recurring rule-based work ideal for remote delivery.","Nonprofits run on tight budgets \u2014 a remote bookkeeper at $1,000-$2,000/month is the difference between clean Form 990 and a board crisis.",'Pitch line: "I track every donor restriction, allocate functional expenses every month, and prepare your books to be Form 990-ready by January 31 \u2014 so your ED can focus on the mission, not the spreadsheet."']},{id:"trucking",name:"Trucking / Logistics",icon:"\u{1F69A}",tagline:"Per-mile economics and IFTA filings.",nuances:[{title:"Per-mile cost analysis",detail:"Total fixed costs (truck payment, insurance, permits) \xF7 miles driven = fixed cost per mile. Variable cost per mile (fuel, maintenance, tolls). Owner-operators live or die by knowing their break-even cost per mile."},{title:"IFTA (International Fuel Tax Agreement)",detail:"Quarterly filing for trucks crossing state lines. Report miles driven in each state and fuel purchased in each state. Net out the over/under-paid tax. Missing IFTA filings = lost authority to operate."},{title:"Driver settlements",detail:"Owner-operators pay drivers per mile or percentage of load. Settlements: driver pay - fuel advances - chargebacks (damage, lumpers). Track per-driver, per-load."},{title:"Fuel cards & detention pay",detail:"EFS, Comdata fuel cards: integrate with QBO to auto-categorize. Detention pay (driver waiting at shipper): separate income account."},{title:"Equipment depreciation",detail:"Tractors: 3-year MACRS for OTR (over-the-road). Trailers: 5-year MACRS. Section 179 election can expense up to $1.2M annually (2026 limit). Bonus depreciation: 60% for 2026 placed-in-service."},{title:"DOT compliance & per-diem",detail:"Driver per-diem (meals & lodging while on the road): IRS standard rate $69/day in 2026 \u2014 80% deductible. Track days on the road per driver."}],coaHighlights:["Operating Cash (1010)","Tractors - Asset (1500)","Trailers - Asset (1510)","Accumulated Depreciation (1515)","Trucking Revenue - Linehaul (4010)","Fuel Surcharge Income (4020)","Detention/Layover Income (4030)","Fuel (5010)","Driver Wages (5020)","Owner-Operator Settlements (5030)","Truck Maintenance (5040)","Tolls (5050)","IFTA Tax Expense (5060)","DOT Permits (6210)"],redFlags:["No IFTA filings on record","No per-mile cost tracking","Drivers classified as employees but paid 1099 (or vice versa)","Fuel card not reconciled monthly","No per-diem tracking"],remoteAdvantage:["IFTA quarterly filings, fuel card reconciliation, driver settlement processing \u2014 high-volume, rule-based work delegable offshore.","Owner-operators are on the road 5-6 days a week \u2014 they have NO time to do books, and a remote bookkeeper covering off-hours is perfect.","Per-mile cost analysis and per-truck profitability reports are weekly recurring deliverables a remote bookkeeper can fully own.",'Pitch line: "I file your IFTA every quarter, reconcile your fuel cards weekly, process driver settlements, and deliver per-mile and per-truck profitability every Friday \u2014 so you stay focused on the road and on hiring drivers."']},{id:"professional",name:"Professional Services (Consulting, Engineering, Architecture)",icon:"\u{1F4BC}",tagline:"Time-and-billing is the heartbeat.",nuances:[{title:"Time tracking \u2192 invoice flow",detail:"Every consultant tracks hours per project. Time data flows to invoice. Most firms use Harvest, Toggl, BigTime, or Clio (legal). Without time tracking, you cannot bill, cannot calculate utilization, cannot price next engagement."},{title:"Project budget vs actual",detail:"Fixed-fee project: track actual hours/cost against budgeted. When you blow the budget, you need to know IN THE MOMENT, not at year-end. Report weekly."},{title:"WIP (work-in-progress) for unbilled time",detail:"Hours worked but not yet invoiced sit as Unbilled Revenue (asset) until invoiced. Move to A/R on invoice. Failure to track WIP = revenue understatement."},{title:"Reimbursable expenses (markups)",detail:"Travel, materials, sub-consultant costs billed to client. Mark up by 5-10% per engagement letter. Track per project. Pass-through travel is NOT revenue (or is, depending on agreement)."},{title:"Realization rate",detail:"(Amount billed \xF7 Standard rate \xD7 Hours worked) \xD7 100. If realization < 85%, you're writing off too much. Common in legal and consulting where client objects to time."},{title:"Effective billing rate",detail:"Total revenue \xF7 Total billable hours = effective hourly rate. Track this monthly per consultant. Senior consultants below their target rate signal a scope/scoping problem."}],coaHighlights:["Operating Cash (1010)","A/R (1210)","Unbilled Revenue / WIP (1230)","Consulting Revenue (4010)","Reimbursable Expense Income (4050)","Subcontractor / Sub-consultant Cost (5010)","Reimbursable Expenses (5050)","Salaries - Senior Consultants (6010)","Salaries - Junior Staff (6020)","Professional Liability Insurance (6220)","Continuing Education (6240)"],redFlags:["No time tracking system","WIP not reconciled monthly","Reimbursable expenses netted against revenue","No utilization or realization rate reporting","Fixed-fee projects with no budget vs actual"],remoteAdvantage:["Time-and-billing data flowing from Harvest/BigTime/Toggl into QBO is rule-based work a remote bookkeeper can own end-to-end.","WIP reconciliation, realization rate calculation, project budget vs actual tracking \u2014 weekly recurring work that frees the principal.","Consultants/engineers/architects are time-poor solo operators \u2014 perfect target for a $1,500-$3,000/month remote engagement.",'Pitch line: "I sync your time tracker to QBO every week, reconcile WIP every month, and deliver realization rate and project-budget reports every Monday \u2014 so you stop billing late and stop writing off time."']},{id:"startup",name:"Tech Startup (Pre-Revenue / Seed)",icon:"\u{1F680}",tagline:"Investor-ready books are the goal.",nuances:[{title:"Runway calculation",detail:"Months of cash on hand at current burn rate. Cash \xF7 Average Monthly Burn = Runway months. Investors and founders watch this weekly. Below 6 months = active fundraising mode."},{title:"Founder loans vs equity",detail:"Money founder puts in: is it a loan (with note, repayable) or equity (capital contribution, ownership %)? Classification has tax implications. Document everything."},{title:"SAFE / Convertible Note accounting",detail:"SAFE (Simple Agreement for Future Equity): liability until conversion, then equity. Convertible Notes: liability + accrued interest, converts at next priced round. Both have valuation caps and discounts to track."},{title:"R&D capitalization (Section 174)",detail:"Since 2022, R&D costs MUST be capitalized and amortized over 5 years (domestic) or 15 years (foreign). Massively impacts taxable income for early-stage companies. Track all R&D meticulously."},{title:"Stock-based compensation (Black-Scholes)",detail:"Options granted to employees: expense over vesting period using option valuation. Cap table software (Carta, Pulley) usually generates the entries. Don't ignore \u2014 required for 409A and future funding rounds."},{title:"Founder/CEO comp pre-Series A",detail:"Most founders are NOT on payroll pre-revenue. Distributions or no comp. Once on payroll, must be reasonable salary per IRS guidance. Tracking matters for future M&A diligence."}],coaHighlights:["Operating Cash (1010)","Founder Loans Receivable (1410)","Capitalized R&D (1610)","Capitalized Software Dev (1620)","SAFE Notes Outstanding (2410)","Convertible Notes Payable (2420)","Founder Loans Payable (2430)","Common Stock (3010)","Preferred Stock (3020)","Additional Paid-In Capital (3030)","R&D Expenses (6010)","Founder Compensation (6020)","Legal & Professional - Fundraising (6210)","Stock-Based Compensation (6610)"],redFlags:["Founders putting in cash with no documentation","R&D not capitalized post-2022 (Section 174 violation)","SAFE notes treated as equity instead of liability","No stock-based comp expense recorded","No runway calculation reported monthly"],remoteAdvantage:["Pre-revenue startups have ZERO budget for US bookkeepers but desperately need investor-ready books \u2014 remote is the only viable model.","Runway calculation, SAFE/convertible note tracking, R&D capitalization (Section 174) \u2014 high-skill work justifying $1,500-$3,000/month engagements.","Tech founders live in Slack, Notion, Linear \u2014 they prefer async remote bookkeepers over old-school in-person CPAs anyway.",'Pitch line: "I keep your books investor-ready every month, track every SAFE note and convertible note correctly, and deliver runway calculation every Monday \u2014 so when your VC asks for a data room, you are ready in 24 hours, not 4 weeks."']},{id:"accountingfirm",name:"Accounting / Tax / CFO Firm (Scaling with Remote Team)",icon:"\u{1F4CA}",tagline:"Your bottleneck is capacity \u2014 not pipeline. Remote talent is the unlock.",nuances:[{title:'The "owner-as-bottleneck" problem',detail:'Most US firms cap out at $300K-$600K revenue because the partner is the production engine. Every new client = more partner hours. Scaling past this requires moving from "partner does the work" to "partner reviews the work." That shift only happens when you have trained offshore/remote bookkeepers handling Tier 1 production. This is the single biggest scale unlock in the industry.'},{title:"Why Filipino bookkeepers are the unfair advantage",detail:'US bookkeeper fully loaded cost: $55K-$85K/year. Filipino remote bookkeeper fully loaded cost: $18K-$36K/year. Same QBO certifications, same English fluency, often stronger work ethic and lower attrition. Firms that crack the offshore hiring playbook see gross margins jump from 35-40% (US-only labor) to 60-70%. This is not "cheap labor" \u2014 it is the model that lets US firms charge $500-$1,500/month per client and still scale.'},{title:"Service tiering: who does what",detail:"Tier 1 (offshore bookkeeper, $15-$30/hr): bank feed coding, reconciliations, A/R, A/P, monthly close prep, draft financial statements. Tier 2 (US senior bookkeeper or remote ProAdvisor, $40-$75/hr): review, adjusting entries, client communication, advisory prep. Tier 3 (US partner/CPA, $150-$400/hr): tax strategy, advisory calls, sign-offs. Each tier has a target % of total billable work \u2014 typically 60% Tier 1, 25% Tier 2, 15% Tier 3."},{title:"The standardization requirement",detail:"Remote teams cannot work effectively without documented processes. SOPs (Standard Operating Procedures) for: client onboarding, monthly close, bank rec, A/R aging review, financial statement prep, file naming, ticket triage. Without SOPs, every new hire requires re-training the partner. With SOPs, a new offshore bookkeeper is productive in 2 weeks instead of 3 months."},{title:"Practice management software is non-negotiable",detail:"Karbon, Jetpack Workflow, Canopy, Financial Cents, Keeper \u2014 pick one. Firms scaling beyond 30 clients without it drown in email and missed deadlines. The tool tracks every recurring engagement, every deadline, every status per client. Offshore team members get clear queues without needing partner messages."},{title:"Client per bookkeeper ratio (the productivity KPI)",detail:"New offshore bookkeeper: 8-12 monthly bookkeeping clients. Experienced offshore bookkeeper after 12 months: 18-25 clients. US senior reviewer: oversees 35-50 clients across 2-3 offshore bookkeepers. Track this monthly. Below benchmark = training problem. Above benchmark = quality risk (review hours getting compressed)."},{title:"Realization & utilization (the firm KPIs)",detail:"Realization rate: (Amount billed \xF7 Standard rate \xD7 Hours worked) \xD7 100. Target 90%+ on retainer, 80%+ tax prep, 70%+ cleanups. Utilization rate: (Billable hours \xF7 Total hours worked) \xD7 100. Target 65-75% for senior staff, 50-60% for partners. These two numbers determine whether the firm is profitable or burning out."},{title:"Recurring vs project revenue mix",detail:"Monthly retainer clients (bookkeeping, advisory, fractional CFO) = predictable MRR. Tax prep, audits, cleanups = project revenue. Goal: 70%+ revenue should be MRR. This is what makes a firm valuable to acquirers (5-8\xD7 MRR vs 1\xD7 project revenue). Track them in separate income accounts; do not lump them."},{title:"Cleanup engagements: the offshore team's sweet spot",detail:"Cleanups (5-18 months of messy books) are the highest-margin engagement type \u2014 typical fee $3K-$25K, delivered in 4-8 weeks. Offshore bookkeepers can knock these out fast because the work is structured (rebuild from bank statements, recategorize, reconcile, deliver). Many firms make 40-50% of their first-year revenue from cleanups alone."},{title:"Subcontractor accounting (the offshore line item)",detail:"Offshore bookkeepers are SUBCONTRACTOR COSTS in COGS (not employee wages). Each gets a contractor agreement, W-8 BEN on file, and a 1099-NEC at year-end if paid through US payroll. If paid via Deel/Remote/Wise direct to a Philippine bank, different treatment \u2014 track that gross-up. Margin per service line collapses if subcontractor rates aren't managed weekly."},{title:"Client trust account & data security",detail:'Many firms hold client funds for tax payments, payroll services, sales tax remittance. Separate trust account, never commingle. Offshore staff accessing client QBO files must be on a separate "team member" role with audit logs. SOC 2 compliance and signed NDAs from every offshore team member are table stakes for clients who care.'},{title:"Hiring playbook for remote bookkeepers",detail:"Source: OnlineJobs.ph, BeyondHQ, Toptal, referrals from existing Filipino team. Test: 2-3 hour paid skills test (categorize 50 transactions, reconcile a messy bank statement, draft a P&L). Onboard: 2-week shadow period with senior reviewer + structured SOP walkthroughs. Retain: monthly raises tied to client load + clear promotion path to senior reviewer."}],coaHighlights:["Operating Cash (1010)","Client Trust Account (1020)","Accounts Receivable (1210)","Unbilled Revenue / WIP (1230)","Client Funds Held - Liability (2100)","MRR - Bookkeeping Services (4010)","MRR - Fractional CFO / Advisory (4015)","Project Revenue - Tax Prep (4020)","Project Revenue - Audit (4030)","Project Revenue - Cleanup / Catch-Up (4040)","Project Revenue - Advisory (4050)","Subcontractor Costs - Offshore Bookkeepers (5010)","Subcontractor Costs - Contract Tax Preparers (5020)","Practice Mgmt Software - Karbon/Jetpack/Canopy (6325)","Tax Prep Software - Drake/Lacerte/UltraTax (6320)","Professional Liability Insurance E&O (6220)","CPA Licensing & CPE (6240)","Partner Salaries (6010)","US Staff Salaries (6020)","Partner Distributions (3500)"],redFlags:["Partner still doing Tier 1 production work (categorizing transactions, doing recs)","No documented SOPs for monthly close or onboarding","No practice management software in use","Offshore bookkeepers paid as W-2 employees instead of subcontractors","No clients-per-bookkeeper ratio tracked","WIP balance growing month over month (collection / billing lag)","Revenue mix below 60% MRR (project-revenue dependent = risky valuation)","No realization or utilization rate reporting per team member","Client trust funds in operating account","No CPE tracking per CPA (license risk)","Offshore team without signed NDAs or SOC 2 compliance baseline"],remoteAdvantage:['YOU are the remote bookkeeper this firm is trying to hire. Read every nuance above through the lens of "what value do I deliver as the Tier 1 production engine?"',"Position yourself by your client load capacity (target 18-25 monthly clients), realization rate (90%+ on retainer), and SOPs you can follow without partner hand-holding.","Show up with QBO/Xero ProAdvisor certifications, U.S. tax basics, industry-specific knowledge (everything in this Industry Accounting tab), and a portfolio of 2-3 sample monthly close packages.",'Pitch line: "I can take 15-20 of your monthly bookkeeping clients off your plate, follow your SOPs from day one, deliver clean monthly closes by the 10th, and free you to do advisory work that bills at $300/hour \u2014 at a third of what a U.S. senior bookkeeper costs you."']}];function gg(){let[e,a]=(0,t.useState)("construction"),o=Qp.find(s=>s.id===e);return t.default.createElement("div",null,t.default.createElement(pe,{eyebrow:"Training & Skills \xB7 Tool",title:"Industry Accounting for Remote Bookkeepers",desc:"As a remote bookkeeper or accountant serving US clients, you're not just doing data entry \u2014 you're solving industry-specific problems from another country. Each of the 12 industries below has its own pain points that a remote bookkeeper is uniquely positioned to solve. Master these and you become indispensable, not replaceable."}),t.default.cr
