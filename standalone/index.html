t:"Default: disregarded entity \u2014 taxed same as sole prop (Schedule C). Can elect S-corp or C-corp taxation. Provides legal protection but no automatic tax benefit."},{h:"Multi-Member LLC / Partnership",t:"Files Form 1065. Issues K-1 to each member showing their share of income. Partners pay tax on K-1 income on personal return."},{h:"S-Corporation",t:'Files Form 1120-S. Owners are employees (must take "reasonable salary" via W-2) + receive K-1 distributions. SE tax savings vs sole prop is the big draw \u2014 but only if salary is reasonable.'},{h:"C-Corporation",t:'Files Form 1120. Pays corporate income tax (21% federal flat rate). Then dividends to owners taxed again on personal return \u2014 "double taxation." Used mostly by larger businesses or those seeking VC.'}],links:[{label:"IRS \xB7 Business Structures",url:"https://www.irs.gov/businesses/small-businesses-self-employed/business-structures"},{label:"IRS \xB7 Form 1065 (Partnership)",url:"https://www.irs.gov/forms-pubs/about-form-1065"},{label:"IRS \xB7 Form 1120-S (S-Corp)",url:"https://www.irs.gov/forms-pubs/about-form-1120-s"},{label:"IRS \xB7 Form 1120 (C-Corp)",url:"https://www.irs.gov/forms-pubs/about-form-1120"},{label:"IRS \xB7 Schedule C (Sole Prop)",url:"https://www.irs.gov/forms-pubs/about-schedule-c-form-1040"}]},{id:"salestax",title:"Sales Tax & Nexus",icon:"\u{1F9FE}",intro:"Sales tax is collected by the business from customers and remitted to the state. Each state has different rules \u2014 45+ states have sales tax, but none are identical.",points:[{h:"Physical nexus",t:"Having an office, employee, inventory, or property in a state creates nexus. Even one remote worker in another state can trigger registration requirements."},{h:"Economic nexus (post-Wayfair, 2018)",t:"Most states have $100K revenue OR 200 transactions threshold. Once you cross it, you must register, collect, and remit. Watch this monthly per state."},{h:"Marketplace facilitator laws",t:"Amazon, Etsy, eBay, Walmart Marketplace collect and remit on the seller's behalf in most states. The seller is still responsible for non-marketplace sales (Shopify direct, retail, wholesale)."},{h:"Resale certificates",t:"Sales to other businesses for resale are sales-tax-exempt with a valid resale certificate. Keep these on file or you're liable for the tax."},{h:"Filing frequency",t:"States assign monthly, quarterly, or annual filing based on volume. Filing on time but with $0 still requires a return. Missed deadlines incur penalties even on zero-tax filings."}],links:[{label:"IRS \xB7 Sales & Use Tax Overview",url:"https://www.irs.gov/businesses/small-businesses-self-employed/sales-and-use-tax"},{label:"Streamlined Sales Tax Project",url:"https://www.streamlinedsalestax.org/"},{label:"AICPA \xB7 State Tax Resources",url:"https://www.aicpa-cima.com/topic/tax/state-and-local-tax"}]},{id:"payrolltax",title:"Payroll Tax",icon:"\u{1F465}",intro:"Once a business has even one W-2 employee, payroll tax becomes critical. Mistakes here create personal liability for owners and bookkeepers.",points:[{h:"Federal withholding (FIT)",t:"Employee's income tax withheld based on W-4. Sent to IRS along with employer portion of FICA. Frequency: monthly or semi-weekly depending on payroll size."},{h:"FICA (Social Security + Medicare)",t:"15.3% total \u2014 split 7.65% employee, 7.65% employer. Social Security capped at $168,600 of wages (2024 limit; check current year). Medicare uncapped."},{h:"FUTA (Federal Unemployment)",t:"6.0% on first $7,000 of each employee's wages, reduced to 0.6% net after state credit. Filed annually on Form 940."},{h:"SUTA (State Unemployment)",t:'State-specific rate (typically 1-6%) on wages up to state cap. New businesses start at "new employer rate," moves to experience-rated after several quarters.'},{h:"Form 941 (quarterly)",t:"Reports wages paid, FIT withheld, FICA tax. Filed quarterly: April 30, July 31, October 31, January 31. Missing = penalty + interest."},{h:"W-2 (annual)",t:"Issued to every employee by January 31. Reports wages, withholding, FICA. Filed with Social Security Administration via W-3 transmittal."},{h:"1099-NEC (annual)",t:"Issued to non-employees paid $600+ in a year for services. Due January 31. Construction, agencies, real estate clients all have heavy 1099 requirements."}],links:[{label:"IRS \xB7 Employer Tax Center",url:"https://www.irs.gov/businesses/small-businesses-self-employed/employer-tax"},{label:"IRS \xB7 Form 941 (Quarterly Payroll)",url:"https://www.irs.gov/forms-pubs/about-form-941"},{label:"IRS \xB7 Form 940 (FUTA)",url:"https://www.irs.gov/forms-pubs/about-form-940"},{label:"IRS \xB7 Form W-2",url:"https://www.irs.gov/forms-pubs/about-form-w-2"},{label:"IRS \xB7 Form 1099-NEC",url:"https://www.irs.gov/forms-pubs/about-form-1099-nec"},{label:"IRS \xB7 Publication 15 (Employer Tax Guide)",url:"https://www.irs.gov/publications/p15"}]},{id:"commonforms",title:"Common Tax Forms \xB7 The Bookkeeper Must Know",icon:"\u{1F4CB}",intro:"These are the forms you'll see week in and week out as a US bookkeeper. Know what each is for, who files it, and when.",points:[{h:"Form W-9 (Request for Taxpayer ID)",t:"Collected FROM contractors BEFORE you pay them. Captures their TIN/SSN for year-end 1099 reporting. Never pay $600+ without one on file."},{h:"Form W-4 (Employee Withholding Cert)",t:"New employees fill this out at hire. Determines how much federal income tax to withhold from each paycheck."},{h:"Form W-2 (Wage & Tax Statement)",t:"Issued to employees by January 31. Reports annual wages and withholding. Filed with SSA."},{h:"Form 1099-NEC (Nonemployee Compensation)",t:"Issued to contractors paid $600+ for services. Box 1 = total paid. Due January 31."},{h:"Form 1099-MISC (Miscellaneous)",t:"Rent, prizes, attorney payments, royalties. Still in use for these specific categories. Due February 28 (paper) / March 31 (electronic)."},{h:"Form 1099-K (Payment Card)",t:"Issued by payment processors (Stripe, PayPal, Shopify). Threshold currently $5,000 (2024) phasing to $600 (delayed multiple times \u2014 check current year)."},{h:"Form 8832 (Entity Classification)",t:"Used to elect a different tax classification (e.g., LLC electing to be taxed as a corporation)."},{h:"Form 2553 (S-Corp Election)",t:"Filed by an eligible entity to elect S-corporation tax status. Must be filed by March 15 of the tax year (or within 2 months 15 days of incorporation)."},{h:"Schedule K-1",t:"Issued by partnerships, S-corps, trusts to each owner showing their share of income. Owner attaches to personal 1040."},{h:"Form 8829 (Home Office)",t:"Deduction for portion of home used regularly and exclusively for business. Most sole props and SMLLC owners benefit."}],links:[{label:"IRS \xB7 All Forms & Publications",url:"https://www.irs.gov/forms-instructions"},{label:"IRS \xB7 Form W-9",url:"https://www.irs.gov/forms-pubs/about-form-w-9"},{label:"IRS \xB7 Form W-4",url:"https://www.irs.gov/forms-pubs/about-form-w-4"},{label:"IRS \xB7 Form 1099-K",url:"https://www.irs.gov/forms-pubs/about-form-1099-k"},{label:"IRS \xB7 Form 2553 (S-Corp Election)",url:"https://www.irs.gov/forms-pubs/about-form-2553"},{label:"IRS \xB7 Schedule K-1",url:"https://www.irs.gov/forms-pubs/about-schedule-k-1-form-1065"}]},{id:"deductions",title:"Common Business Deductions",icon:"\u{1F4B0}",intro:"Bookkeepers do not give tax advice \u2014 but they categorize transactions in ways that make deductions visible or invisible to the CPA. Knowing what's deductible affects your COA setup.",points:[{h:"Ordinary & Necessary (the universal test)",t:"IRS standard: an expense must be both ORDINARY (common in your industry) and NECESSARY (helpful for the business). If it fails either test, not deductible."},{h:"Meals (50% deductible)",t:"Business meals with clients/employees: 50% deductible. Restaurant meals were 100% in 2021-2022 (CARES) but back to 50%. Keep receipts + business purpose noted."},{h:"Entertainment (0% deductible)",t:"Since TCJA 2018, entertainment is no longer deductible. Sporting events, concerts, golf \u2014 not allowed. Only the food/beverage portion (if separately stated) at 50%."},{h:"Vehicle expense (two methods)",t:"Standard mileage rate (2026: ~67\xA2/mile, check current rate) OR Actual expenses (fuel, repairs, insurance, depreciation). Choose one method first year and stick with it."},{h:"Home office (regular & exclusive use)",t:"Square footage of office \xF7 total home sq ft \xD7 eligible expenses (mortgage interest, property tax, utilities, depreciation). Simplified method: $5/sq ft up to $1,500."},{h:"Section 179 + Bonus Depreciation",t:"Section 179: deduct up to $1.16M (2024 limit) of qualifying equipment in year placed in service. Bonus depreciation: 60% for property placed in service in 2024 (phasing down)."},{h:"Qualified Business Income (QBI) deduction",t:"20% deduction on qualified pass-through business income. Sole props, partnerships, S-corps. Income limits and phase-outs apply. Schedule on Form 8995/8995-A."},{h:"Health insurance (self-employed)",t:"Self-employed health insurance premiums deductible above-the-line on 1040. Saves SE tax. Reported on Schedule 1."}],links:[{label:"IRS \xB7 Publication 535 (Business Expenses)",url:"https://www.irs.gov/publications/p535"},{label:"IRS \xB7 Publication 463 (Travel/Meals/Vehicles)",url:"https://www.irs.gov/publications/p463"},{label:"IRS \xB7 Publication 587 (Home Office)",url:"https://www.irs.gov/publications/p587"},{label:"IRS \xB7 Section 179 Deduction",url:"https://www.irs.gov/businesses/small-businesses-self-employed/section-179-expense"},{label:"IRS \xB7 QBI Deduction Overview",url:"https://www.irs.gov/newsroom/qualified-business-income-deduction"}]},{id:"recordkeeping",title:"Recordkeeping Requirements",icon:"\u{1F5C2}\uFE0F",intro:"The IRS requires records to support every position on a tax return. As a bookkeeper, you create the audit trail.",points:[{h:"How long to keep records",t:"General rule: 3 years from filing date. BUT: 6 years if income underreported by 25%+. INDEFINITE if no return filed or fraud. 7 years for bad debt or worthless securities claims."},{h:"What must be kept",t:"Bank statements, credit card statements, receipts for any expense, deposit slips, payroll records, 1099s/W-2s, all tax returns filed, all forms filed (940, 941, state). Digital copies acceptable."},{h:"Mileage logs",t:"Required to deduct vehicle expense. Date, destination, business purpose, miles. Contemporaneous (kept as you drive) \u2014 not reconstructed after the fact."},{h:"Receipt thresholds",t:"Receipts technically required for any expense $75+. Best practice: keep receipts for everything. Apps like Dext, Hubdoc, QBO Receipt Snap make this painless."},{h:"Bank reconciliation as audit defense",t:"Reconciled bank statements are the bookkeeper's strongest audit defense. They prove transactions match real money movement, not estimates."}],links:[{label:"IRS \xB7 Recordkeeping for Business",url:"https://www.irs.gov/businesses/small-businesses-self-employed/recordkeeping"},{label:"IRS \xB7 Publication 583 (Starting a Business & Recordkeeping)",url:"https://www.irs.gov/publications/p583"},{label:"IRS \xB7 How Long Should I Keep Records",url:"https://www.irs.gov/businesses/small-businesses-self-employed/how-long-should-i-keep-records"}]},{id:"compliance",title:"Compliance Calendar \xB7 Key Federal Deadlines",icon:"\u{1F4C5}",intro:"Missing federal deadlines incurs penalties + interest. Bookkeepers should track these in client engagement systems.",points:[{h:"January 31",t:"W-2 to employees \xB7 1099-NEC to contractors \xB7 1099-MISC (Box 7 obsolete, but other boxes) \xB7 Form 941 Q4 due \xB7 State unemployment Q4 due."},{h:"February 28 / March 31",t:"1099-MISC paper filing (Feb 28) or e-filing (March 31). Includes 1099-DIV, 1099-INT, etc."},{h:"March 15",t:"Form 1065 (Partnership) and Form 1120-S (S-Corp) due. Extension Form 7004 gives until September 15."},{h:"April 15",t:"Form 1040 (individual) due \xB7 Form 1120 (C-Corp) due \xB7 Q1 estimated tax \xB7 Extension to October 15 via Form 4868."},{h:"April 30",t:"Form 941 Q1 due. State unemployment Q1 due."},{h:"June 15",t:"Q2 estimated tax. Form 1040 for US persons abroad."},{h:"July 31",t:"Form 941 Q2 due. State unemployment Q2 due. Form 5500 (retirement plans) due."},{h:"September 15",t:"Q3 estimated tax. Form 1065 / 1120-S extended deadline."},{h:"October 15",t:"Form 1040 extended deadline. Form 1120 (C-Corp) extended deadline."},{h:"October 31",t:"Form 941 Q3 due. State unemployment Q3 due."},{h:"January 15 (next year)",t:"Q4 estimated tax (final estimate of prior year)."}],links:[{label:"IRS \xB7 Tax Calendar for Businesses",url:"https://www.irs.gov/businesses/small-businesses-self-employed/online-tax-calendar"},{label:"IRS \xB7 Publication 509 (Tax Calendars)",url:"https://www.irs.gov/publications/p509"},{label:"IRS \xB7 Form 7004 (Business Extension)",url:"https://www.irs.gov/forms-pubs/about-form-7004"}]}];function yg(){let[e,a]=(0,t.useState)("federalbasics"),o=Vp.find(s=>s.id===e);return t.default.createElement("div",null,t.default.createElement(pe,{eyebrow:"Training & Skills \xB7 Tool",title:"US Tax 101 for Bookkeepers",desc:"Bookkeepers don't file tax returns \u2014 but every entry you make affects one. Master these eight topics and you stop being a data-entry clerk and start being a value-adding partner to the CPA."}),t.default.createElement("div",{style:{background:ne},className:"glass-card p-5 rounded-2xl mt-6 mb-5"},t.default.createElement("div",{className:"flex gap-3 items-start"},t.default.createElement(we,{size:20,style:{color:b},className:"flex-shrink-0 mt-0.5"}),t.default.createElement("div",{className:"text-sm text-slate-700 leading-relaxed"},t.default.createElement("span",{className:"font-bold",style:{color:A}},"Important disclaimer:")," This is educational content for bookkeepers \u2014 not tax advice for clients. Always refer clients to a licensed CPA or EA for filing decisions. Bookkeepers prepar he 5th of the month",detail:"Download statements for all bank, credit card, and loan accounts for the just-closed month."},{time:"Same day",task:"Upload statements to QBO Document attachments",detail:"Attach to the matching account in QBO for audit trail. Always."},{time:"Same day",task:"Run initial bank reconciliation",detail:"Mark cleared transactions. Identify any unmatched items."}]},{range:"6th \u2013 7th",color:"#0EA5E9",label:"Open Questions to Client",tasks:[{time:"Day 6",task:'Compile list of "Open Questions" for the client',detail:"Anything you cannot categorize confidently \u2014 bundle into ONE email, not 12 separate ones."},{time:"Day 6",task:'Send "Open Questions" email to client',detail:"Use the BLUF method. Number each question. Attach screenshots. Make it easy to answer."},{time:"Day 7",task:"Continue reconciliations on accounts not waiting for answers",detail:"Do not let one missing answer block 5 other accounts."}]},{range:"8th \u2013 10th",color:"#1E40AF",label:"Reconciliations & Adjustments",tasks:[{time:"Day 8",task:"Complete bank reconciliations for all accounts",detail:"Bank, credit card, loan accounts. Each must reconcile to the statement."},{time:"Day 8",task:"Reconcile merchant processor statements (Stripe, Shopify, Square)",detail:"Net of fees should match deposits. Differences = unreconciled fees or refunds."},{time:"Day 9",task:"Post recurring journal entries",detail:"Depreciation, prepaid amortization, accrued expenses, deferred revenue recognition. Use memorized transactions in QBO."},{time:"Day 9",task:"Review A/R aging \u2014 send collection reminders",detail:"Anything 30+ days past due: friendly reminder. 60+: phone call. 90+: collection process."},{time:"Day 10",task:"Final close \u2014 lock the books in QBO",detail:"After reconciliations, journal entries, and review. Set closing date. Set password."}]},{range:"11th \u2013 13th",color:"#3B82F6",label:"Reports & Delivery",tasks:[{time:"Day 11",task:"Generate monthly financial state CRITICAL \u2014 YOUR KNOWLEDGE CURRENCY:

CURRENT (OBBBA-ERA, May 2026) TAX RULES:

  Section 179 Expensing (effective for property placed in service in tax years beginning after Dec 31, 2024):
  - Maximum deduction: $2.5 million (up from $1.16 million pre-OBBBA)
  - Phase-out threshold: starts at $4 million of property placed in service (up from $2.89 million)
  - Both amounts indexed for inflation going forward

  Bonus Depreciation (Section 168(k)):
  - 100% bonus depreciation PERMANENTLY RESTORED for qualified property acquired AND placed in service AFTER January 19, 2025
  - This reversed the TCJA phasedown (40% for 2025 / 20% for 2026 / 0% for 2027) \u2014 that phasedown no longer applies
  - Applies to new AND used tangible personal property with 20-year-or-less recovery period, computer software, qualified improvement property
  - Property placed in service ON OR BEFORE January 19, 2025 still follows the old TCJA phasedown schedule (60% for 2024, 40% for early-2025 pre-Jan-19)
  - New Section 168(n): 100% depreciation for "Qualified Production Property" (manufacturing/production real property) \u2014 construction must begin Jan 19, 2025 through Dec 31, 2028

  Section 174 / 174A \u2014 R&D Expensing (CRITICAL CHANGE):
  - NEW Section 174A: Domestic R&D expenditures can be FULLY EXPENSED in year paid/incurred (tax years beginning after Dec 31, 2024)

  - Foreign R&D expenditures STILL must be capitalized and amortized over 15 years under continuing Section 174

  - Section 41 R&D credit interplay with 174A \u2014 companies choose between reducing R&E deduction by credit amount OR taking reduced credit to preserve full deduction

  Section 163(j) Interest Limitation: Base for adjusted taxable income (ATI) now includes depreciation and amortization (EBITDA-based) for tax years beginning after Dec 31, 2024 \u2014 expands deductibility vs the prior EBIT-based calculation

  1099 Reporting Thresholds:
  - 1099-NEC and 1099-MISC threshold: $600 for tax year 2025, RAISING TO $2,000 for tax year 2026 and later (per OBBBA)

  - W-2 still required for all employees regardless of amount

YOUR EXPERTISE \u2014 you can answer with authority on:

US GAAP:
- Revenue recognition (ASC 606, performance obligations, transaction price allocation)
- Lease accounting (ASC 842 \u2014 operating vs finance leases, ROU assets, lease liabilities)
- Deferred revenue and revenue recognition over time vs at a point in time
- Accruals, prepaids, deferrals \u2014 recognition timing
- Intangible asset accounting (ASC 350 \u2014 capitalization, amortization, impairment)
- Goodwill and business combinations (ASC 805)
- Inventory accounting (FIFO, LIFO, weighted-avg, lower of cost or NRV)
- Bad debt under allowance method vs direct write-off
- Fair value measurement (ASC 820)
- Stock-based compensation (ASC 718)
- Statement of Cash Flows (direct vs indirect method, classification of activities)
- Functional vs presentation currency in foreign ops (ASC 830)

US Tax Rules (current as of May 2026, post-OBBBA):
- Entity taxation: Sole Prop (Schedule C), Partnership (1065 + K-1), S-Corp (1120-S + K-1, reasonable salary), C-Corp (1120, 21% flat rate, double taxation)

- MACRS depreciation classes and conventions
- Section 174A R&D expensing (per OBBBA rules above)
- Section 1031 like-kind exchanges (real property only post-TCJA, still in effect)
- QBI deduction (Section 199A, 20%, permanent post-OBBBA, SSTB rules, phase-outs)
- Meals (50% deductible), entertainment (0% \u2014 still TCJA rule)
- Home office (regular & exclusive use, simplified $5/sq ft up to $1,500, or actual method)
- Vehicle expense (standard mileage 2025: 70\xA2/mile; 2026: TBD \u2014 verify on IRS.gov)
- 1099-NEC ($600 for 2025, $2,000 for 2026+), 1099-MISC ($2,000 for 2026+), 1099-K ($20K/200 txn restored)
- Sales tax nexus (physical + economic post-Wayfair, varies by state \u2014 $100K/200 txn most common threshold)
- Payroll taxes (FIT, FICA, FUTA on first $7,000 at 6.0% gross / 0.6% net, SUTA varies)

- Estimated taxes (quarterly: Apr 15, Jun 15, Sep 15, Jan 15 \u2014 safe harbor: pay 100% of prior year liability, 110% if AGI > $150K)

Accounting Process & QBO:
- Full accounting cycle (journalize \u2192 post \u2192 trial balance \u2192 adjusting entries \u2192 financial statements \u2192 closing entries)
